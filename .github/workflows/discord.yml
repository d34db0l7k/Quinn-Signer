name: Discord notifications

on:
  workflow_dispatch:
    inputs:
      test_message:
        description: "Custom message for TESTING"
        required: false
        default: "Manual test run"

  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]
    types: [opened, reopened, synchronize, closed]

  create:
  delete:

  member:
    types: [added]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Compose & send message to Discord (no emojis)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

          # Common context
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref_name }}
          FULL_REF: ${{ github.ref }}
          SERVER_URL: ${{ github.server_url }}
          EVENT_NAME: ${{ github.event_name }}

          # Push
          SHA: ${{ github.sha }}

          # PR (pulling into main)
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_MERGED: ${{ github.event.pull_request.merged }}

          # Create/Delete
          REF_TYPE: ${{ github.event.ref_type }}   # 'branch' or 'tag'
          REF_NAME: ${{ github.event.ref }}        # usually the branch/tag name

          # Member (new collaborator)
          MEMBER_LOGIN: ${{ github.event.member.login }}
          MEMBER_HTML_URL: ${{ github.event.member.html_url }}

          # Manual test
          INPUT_MSG: ${{ github.event.inputs.test_message }}
        run: |
          set -euo pipefail

          # Bail early if secret is missing
          if [[ -z "${DISCORD_WEBHOOK:-}" ]]; then
            echo "DISCORD_WEBHOOK secret is not set"; exit 1
          fi

          # ---- Color palette (Discord expects decimal ints) ----
          COLOR_INFO=3447003      # blue
          COLOR_SUCCESS=3066993   # green
          COLOR_WARN=15105570     # orange
          COLOR_ERROR=15158332    # red
          COLOR_PURPLE=10027263   # purple
          COLOR_GRAY=9807270      # gray

          SHORT_SHA="${SHA:0:7}"
          REPO_URL="$SERVER_URL/$REPO"
          ACTOR_URL="$SERVER_URL/$ACTOR"
          AVATAR_URL="https://avatars.githubusercontent.com/${ACTOR}"

          # Branch name helpers
          BRANCH="${REF:-}"
          if [[ -z "$BRANCH" && "${FULL_REF:-}" == refs/heads/* ]]; then
            BRANCH="${FULL_REF#refs/heads/}"
          fi

          # Create/Delete payloads usually give plain names
          CLEAN_REF_NAME="${REF_NAME:-}"
          CLEAN_REF_NAME="${CLEAN_REF_NAME#refs/heads/}"
          CLEAN_REF_NAME="${CLEAN_REF_NAME#refs/tags/}"

          TITLE=""
          DESC=""
          COLOR="$COLOR_INFO"

          case "$EVENT_NAME" in
            workflow_dispatch)
              TITLE="TESTING"
              DESC="${INPUT_MSG:-Manual test run}"
              COLOR="$COLOR_PURPLE"
              ;;

            push)
              TITLE="Push to main"
              DESC="**$REPO**: [$SHORT_SHA]($REPO_URL/commit/$SHA) pushed to **main** by [$ACTOR]($ACTOR_URL)"
              COLOR="$COLOR_SUCCESS"
              ;;

            pull_request)
              # Skip closed-but-not-merged
              if [[ "${{ github.event.action }}" == "closed" && "${PR_MERGED:-false}" != "true" ]]; then
                echo "PR closed without merge; skipping notification."
                exit 0
              fi
              if [[ "${PR_MERGED:-false}" == "true" ]]; then
                TITLE="Pull request merged into main"
                COLOR="$COLOR_SUCCESS"
              else
                TITLE="Pull request to main"
                COLOR="$COLOR_INFO"
              fi
              DESC="**$REPO**: #$PR_NUM *$PR_TITLE* — [View PR]($PR_URL) by [$ACTOR]($ACTOR_URL)"
              ;;

            create)
              if [[ "${REF_TYPE:-}" != "branch" ]]; then
                echo "Create event is not a branch; skipping."
                exit 0
              fi
              BRANCH="${CLEAN_REF_NAME:-$BRANCH}"
              TITLE="New branch"
              DESC="**$REPO**: Branch \`$BRANCH\` created by [$ACTOR]($ACTOR_URL)"
              COLOR="$COLOR_INFO"
              ;;

            delete)
              if [[ "${REF_TYPE:-}" != "branch" ]]; then
                echo "Delete event is not a branch; skipping."
                exit 0
              fi
              BRANCH="${CLEAN_REF_NAME:-$BRANCH}"
              TITLE="Branch deleted"
              DESC="**$REPO**: Branch \`$BRANCH\` deleted by [$ACTOR]($ACTOR_URL)"
              COLOR="$COLOR_ERROR"
              ;;

            member)
              if [[ "${{ github.event.action }}" != "added" ]]; then
                echo "Member event is not 'added'; skipping."
                exit 0
              fi
              TITLE="New collaborator added"
              MEMBER_URL="${MEMBER_HTML_URL:-https://github.com/${MEMBER_LOGIN}}"
              DESC="**$REPO**: [${MEMBER_LOGIN}](${MEMBER_URL}) was granted access by [$ACTOR]($ACTOR_URL)"
              COLOR="$COLOR_WARN"
              if [[ -n "${MEMBER_LOGIN:-}" ]]; then
                AVATAR_URL="https://avatars.githubusercontent.com/${MEMBER_LOGIN}"
              fi
              ;;

            *)
              echo "Event $EVENT_NAME not in allowed set; skipping."
              exit 0
              ;;
          esac

          # Build the embed JSON and send (jq interpolation)
          jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg repo "$REPO" \
            --arg url "$REPO_URL" \
            --arg actor "$ACTOR" \
            --arg actor_url "$ACTOR_URL" \
            --arg ref "${BRANCH:-$REF}" \
            --arg avatar "$AVATAR_URL" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg commit_url "$REPO_URL/commit/$SHA" \
            --arg short_sha "$SHORT_SHA" \
            --arg pr_url "${PR_URL:-}" \
            --arg pr_num "${PR_NUM:-}" \
            --arg pr_title "${PR_TITLE:-}" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                timestamp: $ts,
                color: $color,
                thumbnail: { url: $avatar },
                footer: { text: "GitHub -> Discord · \($repo)" },
                fields: [
                  { "name": "Repository", "value": "[\($repo)](\($url))", "inline": true },
                  { "name": "Actor", "value": "[\($actor)](\($actor_url))", "inline": true },
                  { "name": "Ref", "value": ($ref // "—") },
                  (if $short_sha != "" then
                    { "name": "Commit", "value": "[\($short_sha)](\($commit_url))", "inline": true }
                  else empty end),
                  (if $pr_num != "" then
                    { "name": "PR", "value": "#\($pr_num): \($pr_title)\n\($pr_url)" }
                  else empty end)
                ]
              }]
            }' \
          | curl -fsS -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
